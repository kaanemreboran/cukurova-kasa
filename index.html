<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Çukurova Otomotiv — Kasa Föyü</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a234a">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
  :root{
    --navy-950:#0f1530;
    --navy-900:#151d3d;
    --navy-800:#1a234a;
    --navy-700:#232f60;
    --navy-600:#2d3a75;
    --indigo:#6366f1;
    --indigo-light:#818cf8;
    --ink:#eef0ff;
    --ink-dim:#a8b0d8;
    --line:#2a3560;
    --green:#22c55e;
    --red:#ef4444;
    --amber:#f59e0b;
    --card:#161f42;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--navy-950);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    min-height:100vh;
    transition:background .15s ease, color .15s ease;
  }
  ::selection{background:var(--indigo);color:#fff;}

  /* ---------- light theme ---------- */
  html[data-theme="light"]{
    --navy-950:#f4f5fb;
    --navy-900:#ffffff;
    --navy-800:#eef0fa;
    --navy-700:#e4e7f7;
    --navy-600:#d8dcf3;
    --ink:#1a2140;
    --ink-dim:#6b7290;
    --card:#ffffff;
    --line:#e1e4f2;
  }
  html[data-theme="light"] header{
    background:linear-gradient(135deg,var(--navy-900),var(--navy-800));
    box-shadow:0 1px 0 var(--line);
  }
  html[data-theme="light"] .toast{box-shadow:0 8px 24px rgba(20,25,60,.12);}
  html[data-theme="light"] .card, html[data-theme="light"] .sum-card, html[data-theme="light"] .history-item{
    box-shadow:0 1px 3px rgba(20,25,60,.06);
  }

  .theme-toggle{
    background:none;border:1px solid var(--line);color:var(--ink-dim);
    border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;
    display:flex;align-items:center;gap:6px;
  }
  .theme-toggle:hover{border-color:var(--indigo-light);color:var(--ink);}

  /* ---------- shell ---------- */
  header{
    background:linear-gradient(135deg,var(--navy-900),var(--navy-800));
    border-bottom:1px solid var(--line);
    padding:14px 20px;
    display:flex;align-items:center;justify-content:space-between;
    gap:12px;flex-wrap:wrap;
    position:sticky;top:0;z-index:50;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--indigo-light);box-shadow:0 0 10px var(--indigo-light);}
  .brand h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.2px;}
  .brand span{display:block;font-size:11px;color:var(--ink-dim);font-weight:500;}
  .userbox{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-dim);}
  .userbox b{color:var(--ink);}
  .userbox button{background:none;border:1px solid var(--line);color:var(--ink-dim);border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;}

  nav.tabs{
    display:flex;gap:6px;padding:10px 20px 0;background:var(--navy-950);
    border-bottom:1px solid var(--line);
  }
  nav.tabs button{
    background:none;border:none;color:var(--ink-dim);
    padding:10px 16px;font-size:13.5px;font-weight:600;cursor:pointer;
    border-bottom:2px solid transparent;
  }
  nav.tabs button.active{color:var(--ink);border-bottom-color:var(--indigo-light);}

  main{padding:18px 20px 60px;max-width:1400px;margin:0 auto;}
  .hidden{display:none !important;}

  /* ---------- toolbar ---------- */
  .toolbar{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px 14px;margin-bottom:16px;
  }
  .toolbar label{font-size:12px;color:var(--ink-dim);margin-right:6px;}
  input,select{
    background:var(--navy-900);border:1px solid var(--line);color:var(--ink);
    border-radius:7px;padding:8px 10px;font-size:13.5px;font-family:inherit;
  }
  input:focus,select:focus{outline:none;border-color:var(--indigo-light);}
  .status-pill{
    font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;
    text-transform:uppercase;letter-spacing:.4px;
  }
  .status-pill.acik{background:#153a2c;color:var(--green);}
  .status-pill.kapali{background:#3a1f1f;color:var(--red);}
  .status-pill.yeni{background:#241f3a;color:var(--indigo-light);}
  .spacer{flex:1;}

  button.btn{
    background:var(--indigo);color:#fff;border:none;border-radius:7px;
    padding:9px 16px;font-size:13.5px;font-weight:600;cursor:pointer;
  }
  button.btn:hover{background:var(--indigo-light);}
  button.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink);}
  button.btn.ghost:hover{border-color:var(--indigo-light);}
  button.btn.danger{background:transparent;border:1px solid #5c2626;color:var(--red);}
  button.btn:disabled{opacity:.5;cursor:not-allowed;}

  /* ---------- layout ---------- */
  .grid{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start;}
  @media (max-width:980px){.grid{grid-template-columns:1fr;}}

  .col-forms{display:flex;flex-direction:column;gap:16px;}
  .group-title{
    font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;
    color:var(--indigo-light);margin:6px 0 -4px 2px;
  }
  .group-header{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    cursor:pointer;user-select:none;
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px 14px;margin-top:4px;
  }
  .group-header:hover{border-color:var(--indigo-light);}
  .group-header .g-left{display:flex;align-items:center;gap:10px;}
  .group-header .chevron{
    display:inline-block;transition:transform .18s ease;color:var(--ink-dim);font-size:11px;
  }
  .group-header.open .chevron{transform:rotate(90deg);}
  .group-header .g-title{font-size:13.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;}
  .group-header .g-total{font-size:13px;color:var(--ink-dim);font-weight:600;}
  .group-header .g-total b{color:var(--ink);}
  .group-body{
    display:flex;flex-direction:column;gap:12px;
    padding-top:12px;
  }
  .group-body.collapsed{display:none;}

  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;
  }
  .card-head{
    padding:11px 14px;display:flex;align-items:center;justify-content:space-between;
    background:var(--navy-800);border-bottom:1px solid var(--line);
  }
  .card-head h3{margin:0;font-size:13.5px;font-weight:700;}
  .card-head .toplam{font-size:13px;color:var(--ink-dim);font-weight:600;}
  .card-head .toplam b{color:var(--ink);}
  .card-body{padding:8px 10px;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{
    text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;
    color:var(--ink-dim);padding:6px 8px;font-weight:700;
  }
  td{padding:4px 6px;}
  tr.row-line td{border-bottom:1px solid var(--line);}
  td input{width:100%;padding:6px 8px;font-size:13px;}
  td.tutar-col input{text-align:right;}
  td.action-col{width:34px;text-align:center;}
  .icon-btn{
    background:none;border:none;color:var(--ink-dim);cursor:pointer;font-size:15px;
    padding:2px 6px;border-radius:5px;
  }
  .icon-btn:hover{color:var(--red);background:#241a1a;}
  .add-row-btn{
    display:block;width:100%;text-align:left;background:none;border:1px dashed var(--line);
    color:var(--indigo-light);border-radius:7px;padding:7px 10px;font-size:12.5px;font-weight:600;
    cursor:pointer;margin-top:6px;
  }
  .add-row-btn:hover{border-color:var(--indigo-light);background:var(--navy-800);}

  /* ---------- summary panel ---------- */
  .summary{position:sticky;top:120px;display:flex;flex-direction:column;gap:12px;}
  .sum-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .sum-head{
    padding:9px 14px;background:var(--navy-800);border-bottom:1px solid var(--line);
    font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--indigo-light);
  }
  .sum-body{padding:10px 14px;display:flex;flex-direction:column;gap:6px;}
  .sum-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;gap:8px;}
  .sum-row span:first-child{color:var(--ink-dim);}
  .sum-row b{font-variant-numeric:tabular-nums;}
  .sum-row.total{border-top:1px solid var(--line);padding-top:7px;margin-top:2px;font-size:13.5px;}
  .sum-row.total b{color:var(--indigo-light);}
  .sum-row input{width:130px;text-align:right;padding:5px 8px;}
  .fark-ok b{color:var(--green) !important;}
  .fark-bad b{color:var(--red) !important;}

  /* ---------- history tab ---------- */
  .history-list{display:flex;flex-direction:column;gap:6px;}
  .history-item{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--card);border:1px solid var(--line);border-radius:8px;
    padding:11px 14px;cursor:pointer;
  }
  .history-item:hover{border-color:var(--indigo-light);}
  .history-item .date{font-weight:700;font-size:14px;}
  .history-item .meta{font-size:12px;color:var(--ink-dim);}
  .history-item .nums{display:flex;gap:16px;font-size:12.5px;}
  .history-item .nums div{text-align:right;}
  .history-item .nums span{display:block;color:var(--ink-dim);font-size:10.5px;text-transform:uppercase;}

  .toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:var(--navy-800);border:1px solid var(--line);color:var(--ink);
    padding:11px 18px;border-radius:8px;font-size:13.5px;box-shadow:0 8px 24px rgba(0,0,0,.4);
    z-index:100;opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}
  .toast.err{border-color:#5c2626;color:#fca5a5;}

  .empty{color:var(--ink-dim);font-size:13px;padding:20px;text-align:center;}

  .login-overlay{
    position:fixed;inset:0;background:var(--navy-950);display:flex;
    align-items:center;justify-content:center;z-index:200;
  }
  .login-box{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:28px;width:320px;}
  .login-box h2{margin:0 0 4px;font-size:17px;}
  .login-box p{margin:0 0 16px;font-size:12.5px;color:var(--ink-dim);}
  .login-box input{width:100%;margin-bottom:10px;}
  .login-box button{width:100%;}
</style>
</head>
<body>

<div id="loginOverlay" class="login-overlay hidden">
  <div class="login-box">
    <div id="loginPane">
      <h2>Kasa Föyü</h2>
      <p>Kullanıcı adın ve şifrenle giriş yap.</p>
      <input id="loginUsername" type="text" placeholder="Kullanıcı Adı" autocomplete="username">
      <input id="loginPassword" type="password" placeholder="Şifre" autocomplete="current-password">
      <div id="loginErr" style="color:var(--red);font-size:12px;margin:-4px 0 10px;display:none;"></div>
      <button class="btn" id="loginBtn" onclick="doLogin()">Giriş Yap</button>
      <p style="text-align:center;margin-top:12px;"><a href="#" style="color:var(--indigo-light);font-size:12.5px;" onclick="showRegisterPane();return false;">Yeni kullanıcı oluştur</a></p>
    </div>
    <div id="registerPane" class="hidden">
      <h2>Yeni Kullanıcı</h2>
      <p>Adını, kullanıcı adını ve bir şifre belirle.</p>
      <input id="regAdSoyad" type="text" placeholder="Ad Soyad">
      <input id="regUsername" type="text" placeholder="Kullanıcı Adı" autocomplete="username">
      <input id="regPassword" type="password" placeholder="Şifre" autocomplete="new-password">
      <div id="regErr" style="color:var(--red);font-size:12px;margin:-4px 0 10px;display:none;"></div>
      <button class="btn" id="regBtn" onclick="doRegister()">Hesap Oluştur ve Giriş Yap</button>
      <p style="text-align:center;margin-top:12px;"><a href="#" style="color:var(--indigo-light);font-size:12.5px;" onclick="showLoginPane();return false;">Zaten hesabım var</a></p>
    </div>
  </div>
</div>

<header>
  <div class="brand">
    <span class="dot"></span>
    <div>
      <h1>ÇUKUROVA OTOMOTİV</h1>
      <span>Günlük Kasa Föyü</span>
    </div>
  </div>
  <div class="userbox">
    <button class="theme-toggle" id="themeToggleBtn" onclick="toggleTheme()">☀️ <span id="themeToggleLabel">Açık Mod</span></button>
    <span>Kullanıcı: <b id="currentUserLabel">—</b></span>
    <button onclick="doLogout()">Çıkış</button>
  </div>
</header>

<nav class="tabs">
  <button id="tabBtnFoy" class="active" onclick="switchTab('foy')">Bugünkü Föy</button>
  <button id="tabBtnGecmis" onclick="switchTab('gecmis')">Geçmiş Föyler</button>
  <button id="tabBtnHareketler" onclick="switchTab('hareketler')">Hareketler</button>
</nav>

<main>

  <!-- ===================== FÖY TAB ===================== -->
  <section id="tabFoy">
    <div class="toolbar">
      <label>Tarih</label>
      <input type="date" id="tarihInput" onchange="onDateChange()">
      <span class="status-pill yeni" id="statusPill">Yeni</span>
      <div class="spacer"></div>
      <button class="btn ghost" onclick="loadFoyForDate(true)">Yeniden Yükle</button>
      <button class="btn danger" id="deleteBtn" onclick="deleteFoy()">Föyü Sil</button>
      <button class="btn" id="saveBtn" onclick="saveFoy()">Föyü Kaydet</button>
    </div>

    <div class="grid">
      <div class="col-forms" id="formsContainer">
        <!-- rendered by JS -->
      </div>

      <div class="summary" id="summaryContainer">
        <!-- rendered by JS -->
      </div>
    </div>
  </section>

  <!-- ===================== GEÇMİŞ TAB ===================== -->
  <section id="tabGecmis" class="hidden">
    <div class="toolbar">
      <label>Ara</label>
      <input type="date" id="filtBaslangic">
      <span style="color:var(--ink-dim);font-size:12px;">—</span>
      <input type="date" id="filtBitis">
      <button class="btn ghost" onclick="loadHistory()">Filtrele</button>
      <div class="spacer"></div>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty">Yükleniyor…</div>
    </div>
  </section>

  <!-- ===================== HAREKETLER (İŞLEM GÜNLÜĞÜ) TAB ===================== -->
  <section id="tabHareketler" class="hidden">
    <div class="toolbar">
      <label>Tarih</label>
      <input type="date" id="logFiltTarih">
      <label>Kullanıcı</label>
      <select id="logFiltKullanici"><option value="">Tümü</option></select>
      <button class="btn ghost" onclick="loadLog()">Filtrele</button>
      <div class="spacer"></div>
    </div>
    <div class="history-list" id="logList">
      <div class="empty">Yükleniyor…</div>
    </div>
  </section>

</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
/* ============================================================
   SUPABASE
   ============================================================ */
const SUPABASE_URL = 'https://ztlfephwezsudrvacucd.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_XYTwnqgd3ol9VmYaUrSzzg_uMUqsnyn';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ============================================================
   KART KESİNTİ FORMÜLLERİ — orijinal Excel'den birebir alındı
   ============================================================ */
// Vakıfbank: net = tutar - tutar*1.57%
function vakifNet(tutar){ return tutar - tutar*0.0157; }
// Yapı Kredi (YKB): net = -(tutar - (tutar*97.01% + tutar*99.85%))  [Excel formülü birebir]
function ykbNet(tutar){ return -(tutar - ((tutar*0.9701) + (tutar*0.9985))); }

/* ============================================================
   CONFIG — bölüm/ödeme yöntemi tanımları (spreadsheet'ten birebir)
   ============================================================ */
// islem_tipi: 'satis' | 'tahsilat' | 'odeme'
const SECTIONS = {
  satis: {
    title: 'SATIŞLAR — Kasa Giriş',
    kodLabel: 'Stok Kodu', adLabel: 'Stok Adı',
    methods: [
      { key: 'nakit',        label: 'Nakit Satış',                  hesabaGecen: false },
      { key: 'vakif_kredi',  label: 'Vakıfbank Kredi Kartı Satış',  hesabaGecen: true, commission: vakifNet, commissionLabel: '%1.57 komisyon' },
      { key: 'ykb_kredi',    label: 'Yapı Kredi Kart Satış',        hesabaGecen: true, commission: ykbNet,   commissionLabel: '%3.14 komisyon' },
      { key: 'mailorder',    label: 'Mail Order Satış',             hesabaGecen: false, bayiPassthrough: true },
      { key: 'vakif_havale', label: 'Vakıfbank Havale Satış',       hesabaGecen: false },
      { key: 'ykb_havale',   label: 'YKB Havale Satış',             hesabaGecen: false },
    ]
  },
  tahsilat: {
    title: 'TAHSİLATLAR — Kasa Giriş',
    kodLabel: 'Cari Kodu', adLabel: 'Cari Adı',
    methods: [
      { key: 'nakit',        label: 'Nakit Tahsilat',                    hesabaGecen: false },
      { key: 'vakif_kredi',  label: 'Vakıfbank Kredi Kartı Tahsilat',   hesabaGecen: true, commission: vakifNet, commissionLabel: '%1.57 komisyon' },
      { key: 'ykb_kredi',    label: 'Yapı Kredi Kart Tahsilat',         hesabaGecen: true, commission: ykbNet,   commissionLabel: '%3.14 komisyon' },
      { key: 'mailorder',    label: 'Mail Order Tahsilat',              hesabaGecen: false },
      { key: 'vakif_havale', label: 'Vakıfbank Havale Tahsilat',        hesabaGecen: false },
      { key: 'ykb_havale',   label: 'YKB Havale Tahsilat',              hesabaGecen: false },
    ]
  },
  odeme: {
    title: 'ÖDEMELER — Kasa Çıkış',
    kodLabel: 'Cari Kodu', adLabel: 'Cari Adı',
    methods: [
      { key: 'nakit',        label: 'Nakit Ödeme',            hesabaGecen: false },
      { key: 'kredi_karti',  label: 'Kredi Kartı ile Ödeme',  hesabaGecen: false },
      { key: 'mailorder',    label: 'Mail Order Ödeme',        hesabaGecen: false },
      { key: 'vakif_havale', label: 'Vakıfbank Havale Ödeme', hesabaGecen: false },
      { key: 'ykb_havale',   label: 'YKB Havale Ödeme',        hesabaGecen: false },
    ]
  },
  masraf: {
    title: 'MASRAFLAR',
    kodLabel: null, adLabel: 'Açıklama',
    methods: [
      { key: 'nakit', label: 'Nakit Masraf', hesabaGecen: false },
      { key: 'banka', label: 'Banka Masrafı', hesabaGecen: false },
    ]
  }
};



/* ============================================================
   STATE
   ============================================================ */
let state = null;      // current föy state object
let foyId = null;      // existing kasa_foyleri.id (null = not yet saved)
let foyExists = false;
let currentUser = localStorage.getItem('kasa_user') || '';
let currentUsername = localStorage.getItem('kasa_username') || '';

function blankState(tarih){
  const s = { tarih, nakit_devir:0, vakif_devir:0, ykb_devir:0, kasa_mevcut:'', satis:{}, tahsilat:{}, odeme:{}, masraf:{} };
  for (const tip of ['satis','tahsilat','odeme','masraf']){
    for (const m of SECTIONS[tip].methods){
      s[tip][m.key] = [];
    }
  }
  return s;
}

function newRow(hasHesabaGecen){
  return { kod:'', ad:'', tutar:0, hesaba_gecen: hasHesabaGecen ? 0 : null, bayiye_direkt:false, bayi_adi:'', _id: Math.random().toString(36).slice(2) };
}

/* ============================================================
   THEME
   ============================================================ */
function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('themeToggleBtn');
  const label = document.getElementById('themeToggleLabel');
  if (theme === 'light'){
    btn.firstChild.textContent = '🌙 ';
    label.textContent = 'Koyu Mod';
  } else {
    btn.firstChild.textContent = '☀️ ';
    label.textContent = 'Açık Mod';
  }
  localStorage.setItem('kasa_theme', theme);
}
function toggleTheme(){
  const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  applyTheme(current === 'light' ? 'dark' : 'light');
}
function initTheme(){
  applyTheme(localStorage.getItem('kasa_theme') || 'dark');
}

/* ============================================================
   AUTH — kayıtlı kullanıcı adı + şifre (SHA-256 hash, RLS şirket içi açık)
   ============================================================ */
async function sha256Hex(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function showRegisterPane(){
  document.getElementById('loginPane').classList.add('hidden');
  document.getElementById('registerPane').classList.remove('hidden');
}
function showLoginPane(){
  document.getElementById('registerPane').classList.add('hidden');
  document.getElementById('loginPane').classList.remove('hidden');
}
function showAuthErr(id, msg){
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
}
function hideAuthErr(id){
  document.getElementById(id).style.display = 'none';
}

async function doLogin(){
  hideAuthErr('loginErr');
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!username || !password){ showAuthErr('loginErr','Kullanıcı adı ve şifre gerekli'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Giriş yapılıyor…';
  try{
    const hash = await sha256Hex(password);
    const { data, error } = await sb.from('kullanicilar')
      .select('*').eq('kullanici_adi', username).eq('aktif', true).maybeSingle();
    if (error) throw error;
    if (!data || data.sifre_hash !== hash){
      showAuthErr('loginErr','Kullanıcı adı veya şifre hatalı');
      return;
    }
    currentUser = data.ad_soyad;
    currentUsername = data.kullanici_adi;
    localStorage.setItem('kasa_user', currentUser);
    localStorage.setItem('kasa_username', currentUsername);
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('currentUserLabel').textContent = currentUser;
    init();
  } catch(err){
    showAuthErr('loginErr', 'Giriş hatası: ' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Giriş Yap';
  }
}

async function doRegister(){
  hideAuthErr('regErr');
  const adSoyad = document.getElementById('regAdSoyad').value.trim();
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value;
  if (!adSoyad || !username || !password){ showAuthErr('regErr','Tüm alanları doldur'); return; }
  if (password.length < 4){ showAuthErr('regErr','Şifre en az 4 karakter olmalı'); return; }

  const btn = document.getElementById('regBtn');
  btn.disabled = true; btn.textContent = 'Oluşturuluyor…';
  try{
    const { data: existing } = await sb.from('kullanicilar').select('id').eq('kullanici_adi', username).maybeSingle();
    if (existing){ showAuthErr('regErr','Bu kullanıcı adı zaten alınmış'); return; }

    const hash = await sha256Hex(password);
    const { data, error } = await sb.from('kullanicilar')
      .insert({ kullanici_adi: username, sifre_hash: hash, ad_soyad: adSoyad })
      .select().single();
    if (error) throw error;

    currentUser = data.ad_soyad;
    currentUsername = data.kullanici_adi;
    localStorage.setItem('kasa_user', currentUser);
    localStorage.setItem('kasa_username', currentUsername);
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('currentUserLabel').textContent = currentUser;
    init();
  } catch(err){
    showAuthErr('regErr', 'Kayıt hatası: ' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Hesap Oluştur ve Giriş Yap';
  }
}

function doLogout(){
  localStorage.removeItem('kasa_user');
  localStorage.removeItem('kasa_username');
  location.reload();
}
function checkLogin(){
  if (!currentUser){
    document.getElementById('loginOverlay').classList.remove('hidden');
    return false;
  }
  document.getElementById('currentUserLabel').textContent = currentUser;
  return true;
}

function switchTab(tab){
  document.getElementById('tabFoy').classList.toggle('hidden', tab !== 'foy');
  document.getElementById('tabGecmis').classList.toggle('hidden', tab !== 'gecmis');
  document.getElementById('tabHareketler').classList.toggle('hidden', tab !== 'hareketler');
  document.getElementById('tabBtnFoy').classList.toggle('active', tab === 'foy');
  document.getElementById('tabBtnGecmis').classList.toggle('active', tab === 'gecmis');
  document.getElementById('tabBtnHareketler').classList.toggle('active', tab === 'hareketler');
  if (tab === 'gecmis') loadHistory();
  if (tab === 'hareketler') loadLog();
}

function todayStr(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function init(){
  document.getElementById('tarihInput').value = todayStr();
  loadFoyForDate();
  if ('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
}

function onDateChange(){ loadFoyForDate(); }

/* ============================================================
   LOAD FÖY
   ============================================================ */
async function loadFoyForDate(force){
  const tarih = document.getElementById('tarihInput').value;
  if (!tarih) return;
  setStatus('yeni','Yükleniyor…');

  const { data: foy, error } = await sb.from('kasa_foyleri').select('*').eq('tarih', tarih).maybeSingle();
  if (error){ toast('Yükleme hatası: ' + error.message, true); return; }

  if (!foy){
    foyId = null; foyExists = false;
    state = blankState(tarih);
    setStatus('yeni','Yeni Föy');
    render();
    updateDeleteBtnState();
    return;
  }

  foyId = foy.id; foyExists = true;
  state = blankState(tarih);
  state.nakit_devir = Number(foy.nakit_devir)||0;
  state.vakif_devir = Number(foy.vakif_devir)||0;
  state.ykb_devir = Number(foy.ykb_devir)||0;
  state.kasa_mevcut = foy.kasa_mevcut === null ? '' : Number(foy.kasa_mevcut);

  const { data: hareketler, error: err2 } = await sb.from('kasa_hareketleri').select('*').eq('foy_id', foy.id).order('sira', { ascending:true });
  if (err2){ toast('Hareketler yüklenemedi: ' + err2.message, true); }
  else {
    for (const h of (hareketler||[])){
      const bucket = state[h.islem_tipi] && state[h.islem_tipi][h.odeme_yontemi];
      if (bucket){
        bucket.push({ kod:h.kod||'', ad:h.ad||'', tutar:Number(h.tutar)||0, hesaba_gecen: h.hesaba_gecen===null?null:Number(h.hesaba_gecen), bayiye_direkt: !!h.bayiye_direkt, bayi_adi: h.bayi_adi||'', _id: h.id });
      }
    }
  }
  setStatus(foy.durum === 'kapali' ? 'kapali' : 'acik', foy.durum === 'kapali' ? 'Kapalı' : 'Açık');
  render();
  updateDeleteBtnState();
}

function setStatus(cls,label){
  const pill = document.getElementById('statusPill');
  pill.className = 'status-pill ' + cls;
  pill.textContent = label;
}

/* ============================================================
   RENDER — FORM CARDS
   ============================================================ */
let groupOpen = JSON.parse(localStorage.getItem('kasa_group_open') || '{"satis":true,"tahsilat":true,"odeme":true}');

function saveGroupOpen(){
  localStorage.setItem('kasa_group_open', JSON.stringify(groupOpen));
}
function toggleGroup(tip){
  groupOpen[tip] = !groupOpen[tip];
  saveGroupOpen();
  const body = document.getElementById(`group-body-${tip}`);
  const head = document.getElementById(`group-head-${tip}`);
  body.classList.toggle('collapsed', !groupOpen[tip]);
  head.classList.toggle('open', groupOpen[tip]);
}
function groupTotal(tip){
  let total = 0;
  for (const m of SECTIONS[tip].methods) total += sumRows(tip, m.key);
  return total;
}

function render(){
  const container = document.getElementById('formsContainer');
  container.innerHTML = '';
  for (const tip of ['satis','tahsilat','odeme','masraf']){
    const isOpen = groupOpen[tip] !== false;

    const header = document.createElement('div');
    header.className = 'group-header' + (isOpen ? ' open' : '');
    header.id = `group-head-${tip}`;
    header.innerHTML = `
      <div class="g-left">
        <span class="chevron">▶</span>
        <span class="g-title">${SECTIONS[tip].title}</span>
      </div>
      <span class="g-total">Toplam: <b id="group-total-${tip}">${fmt(groupTotal(tip))}</b></span>
    `;
    header.onclick = () => toggleGroup(tip);
    container.appendChild(header);

    const body = document.createElement('div');
    body.className = 'group-body' + (isOpen ? '' : ' collapsed');
    body.id = `group-body-${tip}`;
    for (const m of SECTIONS[tip].methods){
      body.appendChild(renderCard(tip, m));
    }
    container.appendChild(body);
  }
  renderSummary();
}

function renderCard(tip, method){
  const cfg = SECTIONS[tip];
  const rows = state[tip][method.key];
  const total = rows.reduce((a,r)=>a + (Number(r.tutar)||0), 0);
  const showKod = !!cfg.kodLabel;
  const showBayi = !!method.bayiPassthrough;

  const card = document.createElement('div');
  card.className = 'card';

  const head = document.createElement('div');
  head.className = 'card-head';
  const titleHtml = method.commissionLabel
    ? `<h3>${method.label} <span style="font-weight:500;color:var(--ink-dim);font-size:11px;">(${method.commissionLabel}, otomatik)</span></h3>`
    : `<h3>${method.label}</h3>`;
  head.innerHTML = `${titleHtml}<span class="toplam">Toplam: <b id="total-${tip}-${method.key}">${fmt(total)}</b></span>`;
  card.appendChild(head);

  const body = document.createElement('div');
  body.className = 'card-body';

  if (showBayi){
    const note = document.createElement('div');
    note.style.cssText = 'font-size:11.5px;color:var(--ink-dim);padding:2px 6px 8px;';
    note.textContent = '"Bayiye Direkt" işaretlenen satırlar, tutarı otomatik olarak ödeme tarafından düşer (net kasa etkisi sıfır) ve Mail Order özetinde ayrı gösterilir.';
    body.appendChild(note);
  }

  if (rows.length){
    const table = document.createElement('table');
    table.innerHTML = `<thead><tr>
      ${showKod ? `<th style="width:18%">${cfg.kodLabel}</th>` : ''}
      <th>${cfg.adLabel}</th>
      <th style="width:14%">Tutar</th>
      ${method.hesabaGecen ? '<th style="width:14%">Hesaba Geçen</th>' : ''}
      ${showBayi ? '<th style="width:11%">Bayiye Direkt</th><th style="width:16%">Bayi Adı</th>' : ''}
      <th class="action-col"></th>
    </tr></thead>`;
    const tbody = document.createElement('tbody');
    rows.forEach((row, idx) => {
      const tr = document.createElement('tr');
      tr.className = 'row-line';
      tr.innerHTML = `
        ${showKod ? `<td><input type="text" value="${escapeAttr(row.kod)}" oninput="updateCell('${tip}','${method.key}',${idx},'kod',this.value)"></td>` : ''}
        <td><input type="text" value="${escapeAttr(row.ad)}" oninput="updateCell('${tip}','${method.key}',${idx},'ad',this.value)"></td>
        <td class="tutar-col"><input type="number" step="0.01" value="${row.tutar}" oninput="updateCell('${tip}','${method.key}',${idx},'tutar',this.value)"></td>
        ${method.hesabaGecen ? `<td class="tutar-col"><span id="hg-${tip}-${method.key}-${idx}" style="color:var(--ink-dim);font-variant-numeric:tabular-nums;">${fmt(row.hesaba_gecen ?? 0)}</span></td>` : ''}
        ${showBayi ? `
          <td style="text-align:center;"><input type="checkbox" ${row.bayiye_direkt ? 'checked' : ''} onchange="updateCellBool('${tip}','${method.key}',${idx},'bayiye_direkt',this.checked)" style="width:16px;height:16px;"></td>
          <td><input type="text" placeholder="Bayi adı" value="${escapeAttr(row.bayi_adi)}" oninput="updateCell('${tip}','${method.key}',${idx},'bayi_adi',this.value)"></td>
        ` : ''}
        <td class="action-col"><button class="icon-btn" onclick="removeRow('${tip}','${method.key}',${idx})">✕</button></td>
      `;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    body.appendChild(table);
  }

  const addBtn = document.createElement('button');
  addBtn.className = 'add-row-btn';
  addBtn.textContent = '+ Satır Ekle';
  addBtn.onclick = () => addRow(tip, method.key, method.hesabaGecen);
  body.appendChild(addBtn);

  card.appendChild(body);
  return card;
}

function addRow(tip, key, hasHesabaGecen){
  state[tip][key].push(newRow(hasHesabaGecen));
  render();
}
function removeRow(tip, key, idx){
  state[tip][key].splice(idx,1);
  render();
}
function findMethod(tip, key){
  return SECTIONS[tip].methods.find(m => m.key === key);
}

function updateCell(tip, key, idx, field, value){
  const row = state[tip][key][idx];
  if (field === 'kod' || field === 'ad' || field === 'bayi_adi') row[field] = value;
  else row[field] = value === '' ? 0 : Number(value);

  const method = findMethod(tip, key);
  if (field === 'tutar' && method && method.commission){
    row.hesaba_gecen = method.commission(Number(row.tutar)||0);
    const hgEl = document.getElementById(`hg-${tip}-${key}-${idx}`);
    if (hgEl) hgEl.textContent = fmt(row.hesaba_gecen);
  }

  // live update totals in place — do NOT re-render the form (would steal input focus)
  updateCardTotal(tip, key);
  renderSummarySoft();
}
function updateCellBool(tip, key, idx, field, checked){
  state[tip][key][idx][field] = checked;
  renderSummarySoft();
}
function updateCardTotal(tip, key){
  const total = sumRows(tip, key);
  const el = document.getElementById(`total-${tip}-${key}`);
  if (el) el.textContent = fmt(total);
  const gEl = document.getElementById(`group-total-${tip}`);
  if (gEl) gEl.textContent = fmt(groupTotal(tip));
}

function escapeAttr(v){
  return String(v ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}
function fmt(n){
  return (Number(n)||0).toLocaleString('tr-TR', { minimumFractionDigits:2, maximumFractionDigits:2 });
}

/* ============================================================
   SUMMARY / FORMÜLLER (spreadsheet'teki özet panel mantığı)
   ============================================================ */
function sumRows(tip, key, field){
  field = field || 'tutar';
  return (state[tip][key]||[]).reduce((a,r)=> a + (Number(r[field])||0), 0);
}
function sumHesabaGecen(tip, key){
  return (state[tip][key]||[]).reduce((a,r)=> a + (Number(r.hesaba_gecen)||0), 0);
}

function computeSummary(){
  const s = state;

  // ---- BAYİYE DİREKT AKTARILAN (mail order pass-through) ----
  // Müşteriden alınan mail order tutarı hiç kasaya girmeden doğrudan parça bayisine gidiyor.
  // Satış tarafında tam giriliyor, burada hesaplanan tutar otomatik "ödeme" gibi düşülüyor.
  const bayiyeAktarilanToplam = (state.satis.mailorder || [])
    .filter(r => r.bayiye_direkt)
    .reduce((a,r) => a + (Number(r.tutar)||0), 0);

  // ---- MASRAFLAR ----
  const masrafNakit = sumRows('masraf','nakit');
  const masrafBanka = sumRows('masraf','banka');

  // ---- NAKİT KASA ----
  const nakitGiris = sumRows('satis','nakit') + sumRows('tahsilat','nakit');
  const nakitCikis = sumRows('odeme','nakit') + masrafNakit;
  const nakitDurum = Number(s.nakit_devir||0) + nakitGiris - nakitCikis;
  const kasaMevcut = s.kasa_mevcut === '' ? null : Number(s.kasa_mevcut);
  const fark = kasaMevcut === null ? null : (kasaMevcut - nakitDurum);

  // ---- KREDİ KASA (kart satış + tahsilat, komisyon düşülmüş net tutar) ----
  // Excel'deki Q14/Q15 formülü satış VE tahsilat kart tutarlarını birlikte toplar.
  const vakifKrediSatisNet = sumHesabaGecen('satis','vakif_kredi');
  const vakifKrediTahsilatNet = sumHesabaGecen('tahsilat','vakif_kredi');
  const vakifbankToplamSatis = vakifKrediSatisNet + vakifKrediTahsilatNet;

  const ykbKrediSatisNet = sumHesabaGecen('satis','ykb_kredi');
  const ykbKrediTahsilatNet = sumHesabaGecen('tahsilat','ykb_kredi');
  const ykbToplamSatis = ykbKrediSatisNet + ykbKrediTahsilatNet;

  const toplamKrediliSatis = vakifbankToplamSatis + ykbToplamSatis;

  // ---- MAİL ORDER KASA ----
  const mailorderSatisTutar = sumRows('satis','mailorder');
  const mailorderTahsilatTutar = sumRows('tahsilat','mailorder');
  const mailorderSatisToplam = mailorderSatisTutar + mailorderTahsilatTutar; // Excel Q20 mantığı (satış+tahsilat)
  const mailorderOdemeManuel = sumRows('odeme','mailorder');
  const mailorderOdemeToplam = mailorderOdemeManuel + bayiyeAktarilanToplam;
  const mailorderNetKasaEtkisi = mailorderSatisToplam - mailorderOdemeToplam;

  // ---- BANKA HAREKETLERİ ----
  const bankaDevir = Number(s.vakif_devir||0) + Number(s.ykb_devir||0);

  const vakifGelenHavale = sumRows('satis','vakif_havale') + sumRows('tahsilat','vakif_havale');
  const vakifGidenHavale = sumRows('odeme','vakif_havale');
  const vakifGunHareket = vakifGelenHavale - vakifGidenHavale;
  // Excel Q38: sadece devir + havale hareketi — kart satışları dahil değil.
  const vakifGuncelDurum = Number(s.vakif_devir||0) + vakifGunHareket;

  const ykbGelenHavale = sumRows('satis','ykb_havale') + sumRows('tahsilat','ykb_havale');
  const ykbGidenHavale = sumRows('odeme','ykb_havale');
  const ykbGunHareket = ykbGelenHavale - ykbGidenHavale;
  // Excel Q39: sadece devir + havale hareketi — kart satışları dahil değil.
  const ykbGuncelDurum = Number(s.ykb_devir||0) + ykbGunHareket;

  const bankalarGuncelDurum = vakifGuncelDurum + ykbGuncelDurum - masrafBanka;
  const bankaToplam = bankaDevir; // gün başı banka toplamı (devir)

  return {
    nakitGiris, nakitCikis, nakitDurum, kasaMevcut, fark,
    vakifbankToplamSatis, ykbToplamSatis, toplamKrediliSatis,
    mailorderSatisTutar, mailorderTahsilatTutar, mailorderSatisToplam,
    mailorderOdemeManuel, bayiyeAktarilanToplam, mailorderOdemeToplam, mailorderNetKasaEtkisi,
    bankaDevir, bankaToplam,
    vakifGelenHavale, vakifGidenHavale, vakifGunHareket, vakifGuncelDurum,
    ykbGelenHavale, ykbGidenHavale, ykbGunHareket, ykbGuncelDurum,
    bankalarGuncelDurum, masrafNakit, masrafBanka
  };
}

        <div class="sum-row"><span>YKB Giden Havale</span><b id="s-ykbGiden">${fmt(r.ykbGidenHavale)}</b></div>
        <div class="sum-row"><span>YKB Gün Hareket</span><b id="s-ykbHareket">${fmt(r.ykbGunHareket)}</b></div>

/* ============================================================
   DELETE
   ============================================================ */
async function deleteFoy(){
  if (!foyExists || !foyId){
    toast('Henüz kaydedilmemiş bir föy silinemez', true);
    return;
  }
  const ok = confirm(`${formatDateTR(state.tarih)} tarihli föyü kalıcı olarak silmek istediğine emin misin? Bu işlem geri alınamaz.`);
  if (!ok) return;

  const btn = document.getElementById('deleteBtn');
  btn.disabled = true; btn.textContent = 'Siliniyor…';
  try{
    // kasa_hareketleri, foy_id üzerinde "on delete cascade" ile otomatik silinir
    const { error } = await sb.from('kasa_foyleri').delete().eq('id', foyId);
    if (error) throw error;
    toast('Föy silindi ✓');
    logAction(state.tarih, 'Föy silindi', null);
    foyId = null; foyExists = false;
    state = blankState(state.tarih);
    setStatus('yeni','Yeni Föy');
    render();
    updateDeleteBtnState();
  } catch(err){
    toast('Silme hatası: ' + err.message, true);
  } finally {
    btn.disabled = false; btn.textContent = 'Föyü Sil';
  }
}
function updateDeleteBtnState(){
  const btn = document.getElementById('deleteBtn');
  btn.disabled = !foyExists;
  btn.style.opacity = foyExists ? '1' : '.5';
}

/* ============================================================
   SAVE
   ============================================================ */
async function saveFoy(){
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Kaydediliyor…';
  try{
    const payload = {
      tarih: state.tarih,
      durum: 'acik',
      nakit_devir: Number(state.nakit_devir)||0,
      vakif_devir: Number(state.vakif_devir)||0,
      ykb_devir: Number(state.ykb_devir)||0,
      kasa_mevcut: state.kasa_mevcut === '' ? null : Number(state.kasa_mevcut),
      olusturan: currentUser
    };

    let savedFoyId = foyId;
    if (foyExists){
      const { error } = await sb.from('kasa_foyleri').update(payload).eq('id', foyId);
      if (error) throw error;
    } else {
      const { data, error } = await sb.from('kasa_foyleri').insert(payload).select().single();
      if (error) throw error;
      savedFoyId = data.id;
    }

    // ÖNEMLİ: önce yeni satırları ekle, sadece başarılı olursa eski satırları sil.
    // (Eskiden önce silinip sonra ekleniyordu — ekleme sırasında bir hata olursa
    //  o günün tüm hareketleri kalıcı olarak kayboluyordu.)
    const { data: oldRows, error: oldErr } = await sb.from('kasa_hareketleri').select('id').eq('foy_id', savedFoyId);
    if (oldErr) throw oldErr;
    const oldIds = (oldRows || []).map(r => r.id);

    const rowsToInsert = [];
    for (const tip of ['satis','tahsilat','odeme','masraf']){
      for (const m of SECTIONS[tip].methods){
        state[tip][m.key].forEach((row, idx) => {
          if (!row.kod && !row.ad && !row.tutar) return; // tamamen boş satırı kaydetme
          rowsToInsert.push({
            foy_id: savedFoyId,
            islem_tipi: tip,
            odeme_yontemi: m.key,
            sira: idx + 1,
            kod: row.kod || null,
            ad: row.ad || null,
            tutar: Number(row.tutar)||0,
            hesaba_gecen: m.hesabaGecen ? (Number(row.hesaba_gecen)||0) : null,
            bayiye_direkt: !!row.bayiye_direkt,
            bayi_adi: row.bayi_adi || null
          });
        });
      }
    }
    if (rowsToInsert.length){
      const { error: insErr } = await sb.from('kasa_hareketleri').insert(rowsToInsert);
      if (insErr) throw insErr; // buradan çıkarsa eski satırlar hâlâ duruyor, veri kaybı yok
    }
    if (oldIds.length){
      const { error: delErr } = await sb.from('kasa_hareketleri').delete().in('id', oldIds);
      if (delErr) throw delErr; // silme başarısız olsa bile yeni satırlar zaten kayıtlı (tekrar kaydedince düzelir)
    }

    foyId = savedFoyId; foyExists = true;
    setStatus('acik','Açık');
    toast('Föy kaydedildi ✓');

    const toplamTutar = rowsToInsert.reduce((a,r)=>a+(Number(r.tutar)||0), 0);
    logAction(state.tarih, `Föy kaydedildi — ${rowsToInsert.length} satır, toplam ${fmt(toplamTutar)} ₺`, { satir_sayisi: rowsToInsert.length, toplam_tutar: toplamTutar });
  } catch(err){
    toast('Kaydetme hatası: ' + err.message, true);
  } finally {
    btn.disabled = false; btn.textContent = 'Föyü Kaydet';
  }
}

/* ============================================================
   HISTORY TAB
   ============================================================ */
async function loadHistory(){
  const list = document.getElementById('historyList');
  list.innerHTML = '<div class="empty">Yükleniyor…</div>';

  let q = sb.from('kasa_foyleri').select('*').order('tarih', { ascending:false }).limit(60);
  const b = document.getElementById('filtBaslangic').value;
  const e = document.getElementById('filtBitis').value;
  if (b) q = q.gte('tarih', b);
  if (e) q = q.lte('tarih', e);

  const { data, error } = await q;
  if (error){ list.innerHTML = '<div class="empty">Hata: ' + error.message + '</div>'; return; }
  if (!data || !data.length){ list.innerHTML = '<div class="empty">Kayıt bulunamadı.</div>'; return; }

  list.innerHTML = '';
  for (const foy of data){
    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML = `
      <div>
        <div class="date">${formatDateTR(foy.tarih)}</div>
        <div class="meta">${foy.olusturan || '—'} · ${foy.durum === 'kapali' ? 'Kapalı' : 'Açık'}</div>
      </div>
      <div class="nums">
        <div><span>Kasa Mevcut</span>${foy.kasa_mevcut===null?'—':fmt(foy.kasa_mevcut)}</div>
      </div>
      <button class="icon-btn" style="font-size:17px;" title="Föyü sil">✕</button>
    `;
    const clickArea = div;
    const delBtn = div.querySelector('button.icon-btn');
    delBtn.onclick = async (ev) => {
      ev.stopPropagation();
      const ok = confirm(`${formatDateTR(foy.tarih)} tarihli föyü kalıcı olarak silmek istediğine emin misin?`);
      if (!ok) return;
      const { error } = await sb.from('kasa_foyleri').delete().eq('id', foy.id);
      if (error){ toast('Silme hatası: ' + error.message, true); return; }
      toast('Föy silindi ✓');
      logAction(foy.tarih, 'Föy silindi (geçmiş listesinden)', null);
      if (state && state.tarih === foy.tarih){ foyId = null; foyExists = false; updateDeleteBtnState(); }
      loadHistory();
    };
    clickArea.onclick = () => {
      switchTab('foy');
      document.getElementById('tarihInput').value = foy.tarih;
      loadFoyForDate();
    };
    list.appendChild(div);
  }
}

function formatDateTR(iso){
  const [y,m,d] = iso.split('-');
  return `${d}.${m}.${y}`;
}

/* ============================================================
   HAREKETLER (İŞLEM GÜNLÜĞÜ) TAB
   ============================================================ */
let logUsersLoaded = false;
async function loadLogUserFilter(){
  if (logUsersLoaded) return;
  const { data } = await sb.from('kullanicilar').select('ad_soyad').order('ad_soyad');
  const sel = document.getElementById('logFiltKullanici');
  (data||[]).forEach(u => {
    const opt = document.createElement('option');
    opt.value = u.ad_soyad; opt.textContent = u.ad_soyad;
    sel.appendChild(opt);
  });
  logUsersLoaded = true;
}

async function loadLog(){
  await loadLogUserFilter();
  const list = document.getElementById('logList');
  list.innerHTML = '<div class="empty">Yükleniyor…</div>';

  let q = sb.from('islem_gunlugu').select('*').order('islem_zamani', { ascending:false }).limit(150);
  const tarih = document.getElementById('logFiltTarih').value;
  const kullanici = document.getElementById('logFiltKullanici').value;
  if (tarih) q = q.eq('foy_tarih', tarih);
  if (kullanici) q = q.eq('kullanici_adi', kullanici);

  const { data, error } = await q;
  if (error){ list.innerHTML = '<div class="empty">Hata: ' + error.message + '</div>'; return; }
  if (!data || !data.length){ list.innerHTML = '<div class="empty">Kayıt bulunamadı.</div>'; return; }

  list.innerHTML = '';
  for (const log of data){
    const dt = new Date(log.islem_zamani);
    const zaman = dt.toLocaleString('tr-TR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
    const div = document.createElement('div');
    div.className = 'history-item';
    div.style.cursor = 'default';
    div.innerHTML = `
      <div>
        <div class="date" style="font-size:13.5px;">${log.kullanici_adi} <span style="font-weight:500;color:var(--ink-dim);">— ${formatDateTR(log.foy_tarih)} föyü</span></div>
        <div class="meta">${zaman} · ${escapeAttr(log.ozet||'')}</div>
      </div>
    `;
    list.appendChild(div);
  }
}

async function logAction(foyTarih, ozet, detay){
  try{
    await sb.from('islem_gunlugu').insert({
      foy_tarih: foyTarih,
      kullanici_adi: currentUser,
      ozet: ozet,
      detay: detay || null
    });
  } catch(e){ /* günlük kaydı başarısız olsa da ana işlemi engellemez */ }
}



/* ============================================================
   TOAST
   ============================================================ */
let toastTimer = null;
function toast(msg, isErr){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> el.classList.remove('show'), 3200);
}

/* ============================================================
   BOOT
   ============================================================ */
/* ============================================================
   ENTER = OTO KAYIT
   ============================================================ */
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const el = e.target;
  if (el.tagName !== 'INPUT') return;
  const inForms = el.closest('#formsContainer, #summaryContainer');
  if (!inForms) return;
  e.preventDefault();
  el.blur();
  saveFoy();
});

initTheme();
if (checkLogin()) init();
